<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>運営方針｜業務ツール選定ノート</title><link rel="stylesheet" href="styles.css"></head><body><header><div class="wrap"><a class="brand" href="index.html">業務ツール選定ノート</a></div></header><main><div class="wrap"><article><h1>運営・編集方針</h1><h2>評価方法</h2><p>公式情報、利用条件、実際に確認できた操作結果を分けて記録します。広告報酬の高低だけで順位を変更しません。</p><h2>広告について</h2><p>広告リンクを含む記事には、その事実を読者が認識できる位置に表示します。未利用の商品を利用済みとして紹介しません。</p><h2>訂正</h2><p>誤りを確認した場合は修正し、重要な変更は更新日または記事内に記録します。</p><h2>お問い合わせ</h2><p>お問い合わせ窓口は準備中です。</p></article></div></main></body></html>
